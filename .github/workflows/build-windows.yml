name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install customtkinter fpdf2 Pillow pyinstaller

      - name: Build executable
        shell: bash
        run: |
          cd Code
          pyinstaller --noconfirm --onedir --windowed \
            --name "DIS_PumpSystem" \
            --icon "data/icon.ico" \
            --add-data "data/dis_logo.jpg;data" \
            --add-data "data/icon.png;data" \
            --add-data "data/icon.ico;data" \
            --collect-all customtkinter \
            --paths . \
            --paths app \
            --paths components \
            --paths data \
            --hidden-import config \
            --hidden-import layout \
            --hidden-import icon_choice \
            --hidden-import theme \
            --hidden-import main \
            --hidden-import paths \
            --hidden-import segmented_button \
            --hidden-import customer_info_frame \
            --hidden-import step_reco_tab \
            --hidden-import step_frame \
            --hidden-import reco_frame \
            --hidden-import timer_frame \
            --hidden-import buttons_frame \
            --hidden-import logo_frame \
            --hidden-import notes_frame \
            --hidden-import testnumber_frame \
            --hidden-import save_file \
            --hidden-import pdf_exporter \
            run.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIS_PumpSystem_Windows
          path: Code/dist/DIS_PumpSystem/
          retention-days: 30
