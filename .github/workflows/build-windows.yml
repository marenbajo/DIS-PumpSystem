name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r Code/requirements.txt pyinstaller

      - name: Build executable
        shell: bash
        run: |
          cd Code
          pyinstaller --noconfirm --onedir --windowed \
            --name "DIS_PumpSystem" \
            --icon "data/icon.ico" \
            --add-data "data/dis_logo.jpg;data" \
            --add-data "data/icon.png;data" \
            --add-data "data/icon.ico;data" \
            --collect-all customtkinter \
            --paths . \
            --hidden-import app.config \
            --hidden-import app.layout \
            --hidden-import app.icon_choice \
            --hidden-import app.theme \
            --hidden-import components.segmented_button \
            --hidden-import components.customer_info_frame \
            --hidden-import components.step_reco_tab \
            --hidden-import components.step_frame \
            --hidden-import components.reco_frame \
            --hidden-import components.timer_frame \
            --hidden-import components.buttons_frame \
            --hidden-import components.logo_frame \
            --hidden-import components.notes_frame \
            --hidden-import components.testnumber_frame \
            --hidden-import data.save_file \
            --hidden-import data.pdf_exporter \
            run.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIS_PumpSystem_Windows
          path: Code/dist/DIS_PumpSystem/
          retention-days: 30
